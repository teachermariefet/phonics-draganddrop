<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Phonics Drag & Drop</title>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4a90e2;
            --success: #48bb78;
            --error: #f56565;
            --warning: #f6ad55;
            --container-bg: #fff;
        }

        body {
            font-family: 'Balsamiq Sans', cursive, sans-serif;
            background-image: url('gamebackground.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        #selected-name-display {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 3px 3px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000;
            font-weight: bold;
            margin-top: 20px;
            height: 4rem;
            z-index: 10;
        }

        #game-container {
            background: var(--container-bg);
            padding: 1.5rem;
            border-radius: 26px;
            box-shadow: 0 13px 32px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 750px;
            margin-top: 20px;
            position: relative;
        }

        /* Image Clue Styling */
        #clue-image-container {
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        #clue-image {
            max-height: 100%;
            max-width: 250px;
            border-radius: 15px;
            border: 4px solid #f0f4f8;
            object-fit: contain;
        }

        .word-display {
            font-size: 6rem;
            font-weight: bold;
            letter-spacing: 0.65rem;
            margin: 0.5rem 0;
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }

        .drop-zone {
            display: inline-block;
            width: 95px;
            height: 110px;
            border-bottom: 7px solid var(--primary);
            margin-right: 10px;
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 1rem;
            min-height: 90px;
        }

        .letter {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            font-size: 2.8rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 8px rgba(0,0,0,0.1);
            touch-action: none;
            position: relative;
            z-index: 5;
            user-select: none;
        }

        .letter.dragging {
            opacity: 0.8;
            z-index: 1000;
            transform: scale(1.2);
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1.1rem;
            font-family: 'Balsamiq Sans', cursive, sans-serif;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }

        #pick-btn { background: var(--warning); color: white; }
        #edit-names-btn { background: #4a5568; color: white; }
        #listen-btn { background: #ed8936; color: white; }
        #next-btn { background: var(--success); color: white; display: none; }
        #quit-btn { background: #a0aec0; color: white; }

        #feedback { height: 30px; font-weight: bold; font-size: 1.4rem; margin-bottom: 5px;}
        .correct-text { color: var(--success); }
        .incorrect-text { color: var(--error); }

        #name-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 320px;
            text-align: center;
        }

        #name-input-area {
            width: 90%;
            height: 150px;
            font-family: 'Balsamiq Sans', sans-serif;
            margin-bottom: 15px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div id="selected-name-display"></div>

    <div id="game-container">
        <div id="feedback"></div>
        
        <!-- Image Clue Container -->
        <div id="clue-image-container">
            <img id="clue-image" src="" alt="Clue">
        </div>

        <div class="word-display">
            <span id="drop-zone" class="drop-zone"></span><span id="word-pattern"></span>
        </div>

        <div class="options-container" id="options"></div>

        <div class="controls">
            <button id="pick-btn" onclick="pickRandomName()">Pick Student</button>
            <button id="edit-names-btn" onclick="toggleModal()">Edit Names</button>
            <button id="listen-btn" onclick="speakWord()">Listen</button>
            <button id="next-btn" onclick="nextQuestion()">Next Word</button>
            <button id="quit-btn" onclick="quitGame()">Quit</button>
        </div>
    </div>

    <div id="name-modal">
        <div class="modal-content">
            <h3>Enter Class List</h3>
            <textarea id="name-input-area" placeholder="Enter names..."></textarea>
            <br>
            <button onclick="toggleModal()" style="background: var(--success); color: white;">Save & Close</button>
        </div>
    </div>

<script>
    const vocabulary = [
        { word: 'pet', start: 'p', rest: 'et', img: 'pet.jpg' },
        { word: 'wet', start: 'w', rest: 'et', img: 'wet.jpg' },
        { word: 'net', start: 'n', rest: 'et', img: 'net.jpg' },
        { word: 'bell', start: 'b', rest: 'ell', img: 'bell.jpg' },
        { word: 'well', start: 'w', rest: 'ell', img: 'well.jpg' },
        { word: 'fell', start: 'f', rest: 'ell', img: 'fell.jpg' }
    ];

    let currentItem = null;
    let pool = [...vocabulary];
    let isLocked = false;

    const dropZone = document.getElementById('drop-zone');
    const patternDisplay = document.getElementById('word-pattern');
    const clueImage = document.getElementById('clue-image');
    const optionsContainer = document.getElementById('options');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const nameDisplay = document.getElementById('selected-name-display');

    function initGame() {
        if (pool.length === 0) {
            document.getElementById('game-container').innerHTML = `<h1>🎉 Well Done!</h1><button onclick="location.reload()" style="background: #ed8936; color: white;">Play Again</button>`;
            return;
        }
        isLocked = false;
        currentItem = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
        
        patternDisplay.textContent = currentItem.rest;
        clueImage.src = currentItem.img; 
        
        dropZone.textContent = "";
        dropZone.style.borderBottom = "7px solid var(--primary)";
        feedback.textContent = "";
        nextBtn.style.display = "none";
        setupOptions();
        setTimeout(speakWord, 500);
    }

    function setupOptions() {
        optionsContainer.innerHTML = '';
        const letters = ['p', 'w', 'n', 'b', 'f'];
        letters.sort(() => Math.random() - 0.5);
        letters.forEach(l => {
            const el = document.createElement('div');
            el.className = 'letter';
            el.textContent = l;
            addSmartPointerEvents(el);
            optionsContainer.appendChild(el);
        });
    }

    function addSmartPointerEvents(el) {
        let offsetX, offsetY;
        el.onpointerdown = function(e) {
            if (isLocked) return;
            el.setPointerCapture(e.pointerId);
            el.classList.add('dragging');
            const rect = el.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            el.style.position = 'fixed';
            el.style.left = rect.left + 'px';
            el.style.top = rect.top + 'px';
        };
        el.onpointermove = function(e) {
            if (!el.classList.contains('dragging')) return;
            el.style.left = (e.clientX - offsetX) + 'px';
            el.style.top = (e.clientY - offsetY) + 'px';
        };
        el.onpointerup = function(e) {
            if (!el.classList.contains('dragging')) return;
            el.classList.remove('dragging');
            el.releasePointerCapture(e.pointerId);
            const dropRect = dropZone.getBoundingClientRect();
            const letterRect = el.getBoundingClientRect();
            const isOverlapping = !(letterRect.right < dropRect.left || 
                                    letterRect.left > dropRect.right || 
                                    letterRect.bottom < dropRect.top || 
                                    letterRect.top > dropRect.bottom);
            if (isOverlapping) {
                handleGuess(el.textContent, el);
            } else {
                el.style.position = 'relative';
                el.style.left = '0px'; el.style.top = '0px';
            }
        };
    }

    function handleGuess(letter, el) {
        if (letter === currentItem.start) {
            isLocked = true;
            dropZone.textContent = letter;
            feedback.textContent = "Correct!";
            feedback.className = "correct-text";
            dropZone.style.borderBottom = "7px solid var(--success)";
            nextBtn.style.display = "inline-block";
            el.style.visibility = 'hidden';
        } else {
            feedback.textContent = "Try again!";
            feedback.className = "incorrect-text";
            dropZone.style.borderBottom = "7px solid var(--error)";
            el.style.position = 'relative';
            el.style.left = '0px'; el.style.top = '0px';
            setTimeout(() => { 
                if (!isLocked) {
                    dropZone.textContent = ""; 
                    dropZone.style.borderBottom = "7px solid var(--primary)";
                }
            }, 1000);
        }
    }

    function speakWord() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(currentItem.word);
        utterance.rate = 0.7;
        window.speechSynthesis.speak(utterance);
    }

    function toggleModal() {
        const modal = document.getElementById('name-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    function pickRandomName() {
        const input = document.getElementById('name-input-area').value;
        const names = input.split(/[,\n]/).map(n => n.trim()).filter(n => n !== "");
        if (names.length === 0) {
            nameDisplay.textContent = "Enter Names First!";
            return;
        }
        let counter = 0;
        const interval = setInterval(() => {
            nameDisplay.textContent = names[Math.floor(Math.random() * names.length)];
            counter++;
            if (counter > 12) {
                clearInterval(interval);
                nameDisplay.textContent = "⭐ " + names[Math.floor(Math.random() * names.length)] + " ⭐";
            }
        }, 60);
    }

    function nextQuestion() { initGame(); }
    function quitGame() { if(confirm("Restart game?")) location.reload(); }

    initGame();
</script>
</body>
</html>
